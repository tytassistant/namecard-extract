<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Card Extract</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-pattern"></div>

<div class="app-container">

  <div class="header">
    <div class="header-logo">
      <div class="header-logo-icon"><i class="fas fa-address-card"></i></div>
      <h1>Name Card Extract</h1>
    </div>
  </div>

  <div id="summaryContent" style="display:none;"></div>

  <!-- Empty state -->
  <div id="emptyState" class="card" style="display:none; text-align:center; padding:60px 24px;">
    <i class="fas fa-inbox" style="font-size:48px; color:var(--text-tertiary); margin-bottom:16px;"></i>
    <p style="color:var(--text-secondary); font-family:'Source Serif 4',serif; font-style:italic; font-size:16px;">No sessions yet.</p>
  </div>

  <!-- Loading -->
  <div id="loadingState" class="card" style="text-align:center; padding:40px 24px; display:none;">
    <div class="spinner"></div>
    <div class="loading-text">Loading sessions…</div>
  </div>

  <!-- Capture button -->
  <div class="card" style="text-align:center; padding:24px; margin-top:32px;">
    <a href="/capture" class="btn btn-accent btn-block" style="text-decoration:none;">
      <i class="fas fa-camera"></i> Capture New
    </a>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Confirm overlay -->
<div id="confirmOverlay" class="confirm-overlay" style="display:none;">
  <div class="confirm-box">
    <p id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="btn btn-outline btn-sm" id="confirmCancel">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.documentElement.classList.add("dark");
  }
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(e) {
    document.documentElement.classList[e.matches ? "add" : "remove"]("dark");
  });

  function escapeHtml(str) {
    if (!str) return "";
    var d = document.createElement("div"); d.textContent = str; return d.innerHTML;
  }

  function formatTimestamp(ts) {
    if (!ts) return "—";
    return String(ts).trim().replace("T", " ").substring(0, 16);
  }

  function showToast(msg, type) {
    var tc = document.getElementById("toastContainer");
    var t = document.createElement("div");
    t.className = "toast " + (type || "info"); t.textContent = msg;
    tc.appendChild(t);
    setTimeout(function() {
      t.style.opacity = "0"; t.style.transition = "opacity 0.3s";
      setTimeout(function() { t.remove(); }, 300);
    }, 4000);
  }

  var pendingConfirm = null;
  document.getElementById("confirmCancel").addEventListener("click", function() {
    document.getElementById("confirmOverlay").style.display = "none"; pendingConfirm = null;
  });
  document.getElementById("confirmOk").addEventListener("click", function() {
    document.getElementById("confirmOverlay").style.display = "none";
    if (pendingConfirm) { pendingConfirm(); pendingConfirm = null; }
  });
  function showConfirm(msg, cb) {
    document.getElementById("confirmMsg").textContent = msg;
    document.getElementById("confirmOverlay").style.display = "flex";
    pendingConfirm = cb;
  }

  window._deleteSession = function(sessionId) {
    showConfirm("Delete session " + sessionId + "? All uploaded images and extracted records will be permanently removed.", async function() {
      try {
        var resp = await fetch("/api/delete_session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId })
        });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        showToast("Session deleted.", "success");
        loadSessions();
      } catch(e) {
        showToast("Delete failed: " + e.message, "error");
      }
    });
  };

  async function loadSessions() {
    document.getElementById("loadingState").style.display = "block";
    document.getElementById("summaryContent").style.display = "none";
    document.getElementById("emptyState").style.display = "none";

    try {
      var resp = await fetch("/api/list_sessions");
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      var sessions = await resp.json();

      if (!sessions || sessions.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        return;
      }

      var rows = "";
      sessions.forEach(function(s) {
        var synced = s.synced_google || s.synced_ms;
        rows += "<tr>" +
          "<td>" + escapeHtml(formatTimestamp(s.timestamp)) + "</td>" +
          "<td>" + escapeHtml(s.session_id) + "</td>" +
          "<td><div>Cards: " + s.total_extracted + "</div><div>Sync: " + (synced ? "Y" : "N") + "</div></td>" +
          "<td style=\"text-align:center; vertical-align:middle;\">" +
            "<a href=\"/results?session=" + encodeURIComponent(s.session_id) + "\" class=\"status-success\"><i class=\"fas fa-folder-open\" style=\"font-size:14px;\"></i></a>" +
            "<span onclick=\"_deleteSession('" + escapeHtml(s.session_id) + "')\" class=\"status-danger\" style=\"cursor:pointer;\"><i class=\"fas fa-trash\" style=\"font-size:14px;\"></i></span>" +
          "</td>" +
        "</tr>";
      });

      var summaryEl = document.getElementById("summaryContent");
      summaryEl.innerHTML = "<div class=\"card\">" +
        "<div class=\"card-title\"><i class=\"fas fa-clock-rotate-left\" style=\"margin-right:6px;\"></i> Session History</div>" +
        "<table class=\"results-table\">" +
          "<thead><tr>" +
            "<th style=\"width:30%;\">Date</th>" +
            "<th style=\"width:25%;\">Session</th>" +
            "<th style=\"width:25%;\">Overview</th>" +
            "<th style=\"width:20%; text-align:center;\">Actions</th>" +
          "</tr></thead>" +
          "<tbody>" + rows + "</tbody>" +
        "</table>" +
      "</div>";
      summaryEl.style.display = "block";

    } catch(e) {
      document.getElementById("emptyState").style.display = "block";
      showToast("Failed to load sessions: " + e.message, "error");
    } finally {
      document.getElementById("loadingState").style.display = "none";
    }
  }

  loadSessions();
})();
</script>
</body>
</html>
